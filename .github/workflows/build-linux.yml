name: Build Linux App
on: 
  workflow_dispatch: # Allows you to run this manually from the GitHub UI

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21' # Change to match your go.mod version

      - name: Install Linux Dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails v3
        run: go install -v github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Build Application
        run: wails3 task build PLATFORM=linux CONFIG=production

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: bin/ # Adjust this if your Taskfile outputs to a different folder