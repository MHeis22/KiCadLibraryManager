name: Build Windows App
on: 
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Wails v3
        run: go install -v github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Build Application
        run: wails3 task build PLATFORM=windows CONFIG=production

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: bin/ # This will likely contain a .exe file